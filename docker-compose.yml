services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: cal_tracker
      POSTGRES_USER: cal_tracker
      POSTGRES_PASSWORD: cal_tracker
    ports:
      - "5432:5432"
    volumes:
      - cal_tracker_postgres:/var/lib/postgresql/data
      - ./infra/db/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cal_tracker -d cal_tracker"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  cal_tracker_postgres:
