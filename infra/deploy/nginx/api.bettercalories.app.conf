server {
    listen 80;
    listen [::]:80;
    server_name api.bettercalories.app dev-api.bettercalories.app;

    root /var/www/bettercalories.app/html;

    location /.well-known/acme-challenge/ {
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name api.bettercalories.app;

    ssl_certificate /etc/letsencrypt/live/api.bettercalories.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.bettercalories.app/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    location / {
        include /etc/nginx/snippets/cal-tracker-pro-proxy.conf;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name dev-api.bettercalories.app;

    ssl_certificate /etc/letsencrypt/live/api.bettercalories.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.bettercalories.app/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    location / {
        include /etc/nginx/snippets/cal-tracker-dev-proxy.conf;
    }
}
