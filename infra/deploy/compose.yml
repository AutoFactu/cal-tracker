name: cal-tracker

x-backend-common: &backend-common
  image: ${BACKEND_IMAGE:?BACKEND_IMAGE is required}
  restart: unless-stopped
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - internal
  healthcheck:
    test:
      [
        "CMD",
        "bun",
        "-e",
        "fetch('http://127.0.0.1:' + (process.env.PORT || '3000') + '/v1/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"
      ]
    interval: 15s
    timeout: 5s
    retries: 5
    start_period: 20s

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: cal-tracker-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cal_tracker
      POSTGRES_USER: cal_tracker
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - cal_tracker_postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cal_tracker -d cal_tracker"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend-dev-blue:
    <<: *backend-common
    container_name: cal-tracker-backend-dev-blue
    env_file:
      - path: /srv/cal-tracker/env/dev.env
        required: false
    environment:
      DATABASE_SCHEMA: cal_tracker_dev
      DATABASE_URL: postgres://cal_tracker:${POSTGRES_PASSWORD}@postgres:5432/cal_tracker
      NODE_ENV: production
      PORT: 3000
    ports:
      - "127.0.0.1:3101:3000"

  backend-dev-green:
    <<: *backend-common
    container_name: cal-tracker-backend-dev-green
    env_file:
      - path: /srv/cal-tracker/env/dev.env
        required: false
    environment:
      DATABASE_SCHEMA: cal_tracker_dev
      DATABASE_URL: postgres://cal_tracker:${POSTGRES_PASSWORD}@postgres:5432/cal_tracker
      NODE_ENV: production
      PORT: 3000
    ports:
      - "127.0.0.1:3102:3000"

  backend-pro-blue:
    <<: *backend-common
    container_name: cal-tracker-backend-pro-blue
    env_file:
      - path: /srv/cal-tracker/env/pro.env
        required: false
    environment:
      DATABASE_SCHEMA: cal_tracker_pro
      DATABASE_URL: postgres://cal_tracker:${POSTGRES_PASSWORD}@postgres:5432/cal_tracker
      NODE_ENV: production
      PORT: 3000
    ports:
      - "127.0.0.1:3201:3000"

  backend-pro-green:
    <<: *backend-common
    container_name: cal-tracker-backend-pro-green
    env_file:
      - path: /srv/cal-tracker/env/pro.env
        required: false
    environment:
      DATABASE_SCHEMA: cal_tracker_pro
      DATABASE_URL: postgres://cal_tracker:${POSTGRES_PASSWORD}@postgres:5432/cal_tracker
      NODE_ENV: production
      PORT: 3000
    ports:
      - "127.0.0.1:3202:3000"

networks:
  internal:
    name: cal-tracker-internal

volumes:
  cal_tracker_postgres_data:
