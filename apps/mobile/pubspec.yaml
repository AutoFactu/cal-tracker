name: cal_tracker_mobile
description: Agent-operable calorie and nutrition tracker MVP.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  app_intents: ^0.7.7
  flutter_secure_storage: ^9.2.4
  go_router: ^16.3.0
  http: ^1.6.0
  http_parser: ^4.0.2
  intl: any
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  provider: ^6.1.5+1
  record: ^6.1.2
  marionette_flutter: ^0.5.0
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_driver:
    sdk: flutter
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4
  patrol: ^4.5.0
  marionette_mcp: ^0.5.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/
