name: Backend CI

on:
  pull_request:
    paths:
      - "apps/backend/**"
      - "packages/contracts/**"
      - "infra/db/**"
      - "package.json"
      - "bun.lock"
      - "tsconfig.base.json"
      - ".github/workflows/backend-ci.yml"
  push:
    branches:
      - main
    paths:
      - "apps/backend/**"
      - "packages/contracts/**"
      - "infra/db/**"
      - "package.json"
      - "bun.lock"
      - "tsconfig.base.json"
      - ".github/workflows/backend-ci.yml"

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - run: bun run typecheck

      - run: bun run test

      - run: bun run build

      - run: docker build -f apps/backend/Dockerfile -t cal-tracker-backend:ci .
